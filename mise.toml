[tools]
node = "lts"
npm = "latest"
uv = "latest"

[env]
_.file = { path = ".env" }

[tasks.run_reader]
description = "RSSリーダー: 実行"
run = "uv run python main.py reader"

[tasks.feed_check]
description = "RSSリーダー: フィード設定を確認"
run = "uv run python main.py reader check"

[tasks.run_research]
description = "リサーチ: 実行（クエリは -- で渡す）"
run = "uv run python main.py research"

[tasks.test]
description = "テストを実行"
run = "uv run pytest tests/"
